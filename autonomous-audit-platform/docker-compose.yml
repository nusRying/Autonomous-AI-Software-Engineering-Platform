services:
  gitlab:
    image: 'gitlab/gitlab-ce:latest'
    restart: always
    hostname: 'gitlab.local'
    environment:
      GITLAB_OMNIBUS_CONFIG: |
        external_url 'http://gitlab.local'
        # Reduce memory footprint for local dev
        puma['worker_processes'] = 0
        sidekiq['max_concurrency'] = 10
        prometheus_monitoring['enable'] = false
        gitlab_rails['initial_root_password'] = 'rootpassword123'
    ports:
      - '8080:80'
      - '443:443'
    volumes:
      - './infrastructure/gitlab/config:/etc/gitlab'
      - './infrastructure/gitlab/logs:/var/log/gitlab'
      - './infrastructure/gitlab/data:/var/opt/gitlab'
    shm_size: '256m'
    healthcheck:
      test: ["CMD", "/opt/gitlab/bin/gitlab-healthcheck", "--fail", "--max-time", "10"]
      interval: 60s
      timeout: 60s
      retries: 20
    networks:
      - audit-network
    deploy:
      resources:
        limits:
          memory: 4096M

  temporal:
    image: temporalio/auto-setup:1.22.0
    container_name: audit_platform_temporal
    ports:
      - "7233:7233"
      - "8233:8233"
    environment:
      - DB=postgresql
      - DB_PORT=5432
      - POSTGRES_USER=temporal
      - POSTGRES_PWD=temporal
      - POSTGRES_SEEDS=temporal-postgresql
    depends_on:
      temporal-postgresql:
        condition: service_healthy
    networks:
      - audit-network

  temporal-postgresql:
    image: postgres:13
    container_name: audit_platform_temporal_db
    environment:
      - POSTGRES_USER=temporal
      - POSTGRES_PASSWORD=temporal
      - POSTGRES_DB=temporal
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U temporal"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - audit-network

  loki:
    image: grafana/loki:latest
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - audit-network

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./infrastructure/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - audit-network

  redis:
    image: redis:7-alpine
    container_name: audit_platform_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - audit-network

  minio:
    image: minio/minio:latest
    container_name: audit_platform_minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - audit-network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: audit_platform_app
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - .:/app
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./app/data/platform.db
      - REDIS_URL=redis://redis:6379/0
      - MINIO_ENDPOINT=minio:9000
    networks:
      - audit-network

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: audit_platform_worker
    command: celery -A app.celery_app worker --loglevel=info --concurrency=2
    depends_on:
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - .:/app
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./app/data/platform.db
      - REDIS_URL=redis://redis:6379/0
      - MINIO_ENDPOINT=minio:9000
    networks:
      - audit-network

  frontend:
    image: node:20-alpine
    container_name: audit_platform_frontend
    working_dir: /app/frontend
    ports:
      - "5173:5173"
    volumes:
      - .:/app
    command: sh -c "npm install && npm run dev -- --host"
    networks:
      - audit-network

  appsmith:
    image: index.docker.io/appsmith/appsmith-ce
    container_name: audit_platform_appsmith
    ports:
      - "8081:80"
      - "8443:443"
    volumes:
      - ./infrastructure/appsmith/stacks:/appsmith-stacks
    restart: always
    networks:
      - audit-network

  structurizr:
    image: structurizr/lite
    container_name: audit_platform_structurizr
    ports:
      - "8082:8080"
    volumes:
      - ./audit_reports:/usr/local/structurizr
    networks:
      - audit-network

  sonarqube:
    image: sonarqube:community
    container_name: audit_platform_sonarqube
    ports:
      - "9003:9000"
    environment:
      - SONAR_ES_BOOTSTRAP_CHECKS_DISABLE=true
    networks:
      - audit-network

  neo4j:
    image: neo4j:enterprise
    container_name: audit_platform_neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/Umair@825
      - NEO4J_ACCEPT_LICENSE_AGREEMENT=yes
    volumes:
      - ./infrastructure/neo4j/data:/data
      - ./infrastructure/neo4j/logs:/logs
    networks:
      - audit-network

  qdrant:
    image: qdrant/qdrant:latest
    container_name: audit_platform_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./infrastructure/qdrant/storage:/qdrant/storage
    networks:
      - audit-network

  comfyui:
    image: python:3.11-slim
    container_name: audit_platform_comfyui
    command: ["python", "-c", "from http.server import BaseHTTPRequestHandler, HTTPServer; import json; class MockComfyUI(BaseHTTPRequestHandler): def do_POST(s): s.send_response(200); s.send_header('Content-Type', 'application/json'); s.end_headers(); s.wfile.write(json.dumps({'prompt_id': 'mock-1234'}).encode('utf-8')); HTTPServer(('0.0.0.0', 8188), MockComfyUI).serve_forever()"]
    ports:
      - "8188:8188"
    networks:
      - audit-network

networks:
  audit-network:
    driver: bridge
