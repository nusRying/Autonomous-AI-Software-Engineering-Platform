# engineer_tasks.yaml
#
# Defines the tasks for the Engineering workflow (Milestone 2).

technical_spec_task:
  description: >
    Take the following high-level project idea: {project_prompt}

    Decompose this idea into a complete technical specification. Your output MUST include:
    1. System Architecture — overview of components
    2. Database Schema — tables, relationships, columns
    3. API Endpoints — paths, methods, request/response models
    4. Frontend Structure — key components and state management
    5. Tech Stack — versions of frameworks to be used (Prefer FastAPI + React + Tailwind)

    Output MUST be a valid JSON object.
  expected_output: >
    A detailed JSON specification covering architecture, DB, API, and UI.
  agent: architect_agent

full_stack_generation_task:
  description: >
    Implement the FULL system based on the following technical specification:
    {tech_spec}

    Project Idea: {project_prompt}
    Target Directory: {repo_path}

    You must generate:
    1. `backend/` directory with FastAPI app, models, and routes.
    2. `frontend/` directory with React/Tailwind components (Vite-based).
    3. `docker-compose.yml` to run both services.
    4. `README.md` with setup instructions.

    Focus on writing modular, reusable, and secure code. Include docstrings.
    All files must be written to the {repo_path} directory.
  expected_output: >
    A complete directory structure at {repo_path} containing all source code.
  agent: engineer_agent

stability_verification_task:
  description: >
    Run the generated application in a Docker sandbox.
    Perform the following:
    1. Verify backend starts and API docs are reachable.
    2. Run generated unit tests.
    3. Report any tracebacks or errors back to the Engineer.

    If errors are found, specify the exact line and fix requirement.
  expected_output: >
    A stability report (JSON) with "status": "stable" or "status": "error" + logs.
  agent: qa_agent
  context:
    - full_stack_generation_task

documentation_task:
  description: >
    Analyze the generated code in {repo_path} and create:
    1. README.md: Project title, description, tech stack, and setup instructions.
    2. API_SPEC.md: Comprehensive list of endpoints, request formats, and response examples.

    Use the technical specification and the actual implemented code as references.
    Save these files to the {repo_path} directory using your tools.
  expected_output: >
    Professional README.md and API_SPEC.md files saved in the project repository.
  agent: technical_writer_agent
  context:
    - full_stack_generation_task
